<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tetris</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <div class="game-layout">
        <section class="board-wrap">
          <canvas
            id="gameCanvas"
            width="300"
            height="600"
            aria-label="Tetris game board"
            role="img"
          ></canvas>

          <div class="controls">
            <button id="startBtn" type="button">Start Game</button>
            <button id="restartBtn" type="button">Restart Game</button>
          </div>

          <div class="touch-controls" aria-label="Touch controls for mobile">
            <button class="touch-btn" data-action="left" type="button" aria-label="Move left">←</button>
            <button class="touch-btn" data-action="rotate" type="button" aria-label="Rotate">↑</button>
            <button class="touch-btn" data-action="right" type="button" aria-label="Move right">→</button>
            <button class="touch-btn" data-action="down" type="button" aria-label="Soft drop">↓</button>
            <button class="touch-btn" data-action="hard-drop" type="button" aria-label="Hard drop">DROP</button>
            <button class="touch-btn" data-action="hold" type="button" aria-label="Hold piece">HOLD</button>
            <button class="touch-btn" data-action="pause" type="button" aria-label="Pause or resume">PAUSE</button>
          </div>
        </section>

        <aside class="side-panel">
          <div class="stat-card">
            <p class="stat-label">Hold</p>
            <canvas
              id="holdCanvas"
              width="120"
              height="120"
              aria-label="Held tetris piece preview"
              role="img"
            ></canvas>
          </div>

          <div class="stat-card">
            <p class="stat-label">Score</p>
            <p class="stat-value" id="score">0</p>
          </div>

          <div class="stat-card">
            <p class="stat-label">Level</p>
            <p class="stat-value" id="level">1</p>
          </div>

          <div class="stat-card">
            <p class="stat-label">Next</p>
            <canvas
              id="nextCanvas"
              width="120"
              height="120"
              aria-label="Next tetris piece preview"
              role="img"
            ></canvas>
          </div>

          <div class="stat-card">
            <p class="stat-label">Audio</p>
            <button id="soundToggleBtn" type="button">Sound: On</button>
          </div>

          <div class="stat-card instructions">
            <p class="stat-label">How To Play</p>
            <p class="instruction-line">Keyboard: ← → move</p>
            <p class="instruction-line">Keyboard: ↑ rotate, ↓ soft drop</p>
            <p class="instruction-line">Keyboard: Space drop, C hold, P pause</p>
            <p class="instruction-line">Mobile: use arrow buttons below board</p>
          </div>
        </aside>
      </div>

      <p class="status" id="status" aria-live="polite"></p>
    </main>

    <script src="script.js"></script>
  </body>
</html>
